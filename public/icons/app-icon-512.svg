<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4763A"/>
      <stop offset="100%" stop-color="#A14820"/>
    </linearGradient>
    <!-- 내부 빛 효과 -->
    <radialGradient id="glow" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#E8935A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A14820" stop-opacity="0"/>
    </radialGradient>
    <!-- 골드 그라데이션 -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D98A"/>
      <stop offset="40%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- 텍스트 그라데이션 -->
    <linearGradient id="textGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="50%" stop-color="#FFF5EB"/>
      <stop offset="100%" stop-color="#F5E6D0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- 외곽 골드 테두리 -->
  <rect x="20" y="20" width="472" height="472" rx="78" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-opacity="0.5"/>

  <!-- 내부 장식 테두리 -->
  <rect x="36" y="36" width="440" height="440" rx="64" fill="none" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.25"/>

  <!-- 코너 장식 (좌상) -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-opacity="0.4">
    <path d="M56,90 L56,56 L90,56"/>
    <circle cx="56" cy="56" r="3" fill="url(#gold)" fill-opacity="0.4" stroke="none"/>
  </g>
  <!-- 코너 장식 (우상) -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-opacity="0.4">
    <path d="M422,56 L456,56 L456,90"/>
    <circle cx="456" cy="56" r="3" fill="url(#gold)" fill-opacity="0.4" stroke="none"/>
  </g>
  <!-- 코너 장식 (좌하) -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-opacity="0.4">
    <path d="M56,422 L56,456 L90,456"/>
    <circle cx="56" cy="456" r="3" fill="url(#gold)" fill-opacity="0.4" stroke="none"/>
  </g>
  <!-- 코너 장식 (우하) -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-opacity="0.4">
    <path d="M456,422 L456,456 L422,456"/>
    <circle cx="456" cy="456" r="3" fill="url(#gold)" fill-opacity="0.4" stroke="none"/>
  </g>

  <!-- 상단 장식선 -->
  <line x1="110" y1="56" x2="402" y2="56" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- 하단 장식선 -->
  <line x1="110" y1="456" x2="402" y2="456" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- 家 글자 (메인) -->
  <text x="256" y="300" text-anchor="middle" font-family="'Noto Serif KR', 'Batang', serif" font-weight="700" font-size="220" fill="url(#textGold)" filter="none">家</text>

  <!-- 家 글자 그림자 -->
  <text x="258" y="302" text-anchor="middle" font-family="'Noto Serif KR', 'Batang', serif" font-weight="700" font-size="220" fill="#8B3A1A" fill-opacity="0.2" filter="none">家</text>

  <!-- 하단 텍스트: 우리家이야기 -->
  <text x="256" y="400" text-anchor="middle" font-family="'Noto Serif KR', 'Batang', serif" font-weight="400" font-size="36" fill="url(#gold)" fill-opacity="0.7">우리家이야기</text>

  <!-- 상단 작은 장식 -->
  <g transform="translate(256, 100)" fill="url(#gold)" fill-opacity="0.35">
    <path d="M-30,0 Q-15,-8 0,-2 Q15,-8 30,0 Q15,8 0,2 Q-15,8 -30,0Z"/>
  </g>

  <!-- 하단 작은 장식 -->
  <g transform="translate(256, 430)" fill="url(#gold)" fill-opacity="0.3">
    <circle cx="-20" cy="0" r="1.5"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="url(#gold)" stroke-width="0.8" stroke-opacity="0.3"/>
    <circle cx="20" cy="0" r="1.5"/>
  </g>
</svg>
